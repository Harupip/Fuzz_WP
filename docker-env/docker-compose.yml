version: '3.8'

services:

  mysql:
    image: mysql:8.0
    container_name: shop_demo_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wp_user
      MYSQL_PASSWORD: wp_password
    volumes:
      - mysql_data:/var/lib/mysql
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 5

  wordpress:
    build: .
    container_name: shop_demo_wp
    ports:
      - "8088:80"
    environment:
      WORDPRESS_DB_HOST: mysql
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wp_user
      WORDPRESS_DB_PASSWORD: wp_password
    volumes:
      # Hook coverage logs (xem được trên Windows)
      - ./hook-coverage:/var/www/uopz/hook-coverage
      # NOTE: shop-demo.php và uopz_hooks.php cần inject thủ công lần đầu
      # (do Windows OneDrive path có spaces gây lỗi volume mount)
      # Dùng: python inject_files.py
    depends_on:
      mysql:
        condition: service_healthy
    restart: always

volumes:
  mysql_data:
